version: '3.8'

services:
  

  web:
    restart: always
    build: .
    ports:
      - 8082:8082
    command: uvicorn main:app --host 0.0.0.0 --reload --port 8082
    volumes:
      - .:/usr/src/app
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis

  worker:
    restart: always
    build: .
    command: celery -A worker.celery worker --loglevel=info
    volumes:
      - .:/usr/src/app
      - /media/amari/SSD T7:/media/amari/SSD T7
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - web
      - redis

  redis:
    restart: always
    image: redis:7
    ports:
      - 6379:6379
